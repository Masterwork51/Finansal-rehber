name: Telefona Yayınla (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Site dosyalarını hazırla
        run: |
          mkdir -p _site
          cp index.html yatirim.html manifest.json sw.js _site/
          cp -r css js icons data _site/

      - name: GitHub Pages'e yükle
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
