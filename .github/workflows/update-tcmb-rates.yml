name: TCMB Kurlarını Güncelle

on:
  schedule:
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: TCMB kurlarını çek
        run: python3 scripts/fetch_tcmb.py

      - name: Değişiklikleri kaydet
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "TCMB kurları otomatik güncellendi"
          file_pattern: data/tcmb-rates.json
